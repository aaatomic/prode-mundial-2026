<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración para forzar modo oscuro como Vercel
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-green-400 mb-8">🏆 Prode Mundial 2026</h1>
        
        <div id="matches-container" class="space-y-4">
            <p class="text-center text-gray-400 animate-pulse">Cargando partidos desde Sheets...</p>
        </div>
    </div>

    <script>
        // LA URL DE TU GOOGLE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbzUzjYnU_tXEZwWb5GIWbiXrnV9_4TZtZU_AZrh47m5dhcc0YC90tl7gyUajUOtOZuG8g/exec";

        // Función para ir a buscar los partidos a tu Excel
        async function cargarPartidos() {
            try {
                const respuesta = await fetch(API_URL);
                const partidos = await respuesta.json();
                
                const contenedor = document.getElementById('matches-container');
                contenedor.innerHTML = ''; // Limpiamos el "cargando..."

                partidos.forEach(partido => {
                    // Si el estado no es PROGRAMADO, podríamos ocultar los inputs
                    contenedor.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 flex justify-between items-center">
                            <div class="text-xl font-semibold w-1/3 text-right">${partido.team_a}</div>
                            <div class="flex gap-2 w-1/3 justify-center">
                                <input type="number" class="w-12 h-12 text-center text-2xl bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-green-400" placeholder="-">
                                <span class="text-2xl mt-2">-</span>
                                <input type="number" class="w-12 h-12 text-center text-2xl bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-green-400" placeholder="-">
                            </div>
                            <div class="text-xl font-semibold w-1/3 text-left">${partido.team_b}</div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error cargando partidos:", error);
            }
        }

        // Ejecutar al cargar la página
        cargarPartidos();
    </script>
</body>
</html>
