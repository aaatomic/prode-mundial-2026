<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-900 text-white p-4 md:p-6 font-sans pb-24">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-green-400 mb-6">🏆 Prode Mundial 2026</h1>
        
        <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 mb-8">
            <label class="block text-sm text-gray-400 mb-2">Ingresá tu Email o Nombre para jugar:</label>
            <input type="text" id="user-email" class="w-full bg-gray-700 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-green-400" placeholder="ejemplo@mail.com o 'Tomi'">
        </div>
        
        <div id="matches-container" class="space-y-4">
            <p class="text-center text-gray-400 animate-pulse">Cargando partidos...</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-gray-900 border-t border-gray-800 flex justify-center">
        <button onclick="guardarPredicciones()" id="btn-guardar" class="bg-green-500 hover:bg-green-600 text-black font-bold text-lg py-3 px-8 rounded-full shadow-lg transition-all w-full max-w-2xl">
            💾 Guardar Mis Resultados
        </button>
    </div>

    <script>
        // ¡Acá está tu URL real conectada!
        const API_URL = "https://script.google.com/macros/s/AKfycbzUzjYnU_tXEZwWb5GIWbiXrnV9_4TZtZU_AZrh47m5dhcc0YC90tl7gyUajUOtOZuG8g/exec"; 
        
        let partidosGlobales = []; // Guardamos los partidos para usarlos al guardar

        async function cargarPartidos() {
            try {
                const respuesta = await fetch(API_URL);
                partidosGlobales = await respuesta.json();
                
                const contenedor = document.getElementById('matches-container');
                contenedor.innerHTML = ''; 

                partidosGlobales.forEach(partido => {
                    contenedor.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 flex justify-between items-center">
                            <div class="text-lg md:text-xl font-semibold w-1/3 text-right pr-2 md:pr-4 truncate">${partido.team_a}</div>
                            <div class="flex gap-2 w-1/3 justify-center">
                                <input type="number" id="goles_a_${partido.id}" min="0" class="w-10 h-10 md:w-12 md:h-12 text-center text-xl bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-green-400" placeholder="-">
                                <span class="text-2xl mt-1 md:mt-2 text-gray-500">-</span>
                                <input type="number" id="goles_b_${partido.id}" min="0" class="w-10 h-10 md:w-12 md:h-12 text-center text-xl bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-green-400" placeholder="-">
                            </div>
                            <div class="text-lg md:text-xl font-semibold w-1/3 text-left pl-2 md:pl-4 truncate">${partido.team_b}</div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error cargando partidos:", error);
                document.getElementById('matches-container').innerHTML = '<p class="text-center text-red-400">Error al cargar. Verificá tu conexión a internet.</p>';
            }
        }

        async function guardarPredicciones() {
            const email = document.getElementById('user-email').value.trim();
            if (!email) {
                alert("¡Pará, máquina! Necesito tu email o nombre para saber de quién son estos resultados.");
                return;
            }

            const btn = document.getElementById('btn-guardar');
            btn.innerText = "⏳ Guardando...";
            btn.disabled = true;

            // Recopilamos todos los resultados que llenó
            let guardoAlgo = false;

            for (let partido of partidosGlobales) {
                let golesA = document.getElementById(`goles_a_${partido.id}`).value;
                let golesB = document.getElementById(`goles_b_${partido.id}`).value;

                // Solo mandamos si llenó los dos campos de ese partido
                if (golesA !== "" && golesB !== "") {
                    guardoAlgo = true;
                    const datos = {
                        user_email: email,
                        match_id: partido.id,
                        pred_a: parseInt(golesA),
                        pred_b: parseInt(golesB)
                    };

                    try {
                        // Enviamos a la pestaña "predictions" de Google Sheets
                        await fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify(datos),
                            headers: { "Content-Type": "text/plain;charset=utf-8" }
                        });
                    } catch (e) {
                        console.error("Error al guardar:", e);
                    }
                }
            }

            if (!guardoAlgo) {
                alert("No pusiste ningún resultado. ¡Completá algún partido primero!");
            } else {
                alert("¡Resultados guardados con éxito en tu Google Sheet! 🏆");
            }
            
            btn.innerText = "💾 Guardar Mis Resultados";
            btn.disabled = false;
        }

        cargarPartidos();
    </script>
</body>
</html>
