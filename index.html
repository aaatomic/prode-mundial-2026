<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gold: '#fbbf24', silver: '#94a3b8', bronze: '#b45309' } } } }
    </script>
    <style>
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .group-content { display: none; }
        .group-content.active { display: block; }
        .app-screen { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-24 min-h-screen">

    <div class="max-w-3xl mx-auto p-2 sm:p-4 md:p-6">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-green-400 mb-8 mt-4">🏆 Prode Mundial 2026</h1>
        
        <div id="auth-screen" class="app-screen max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6">Iniciar Sesión</h2>
            <div id="div-name" class="hidden mb-4">
                <label class="block text-sm text-slate-400 mb-1">Tu Nombre / Apodo</label>
                <input type="text" id="auth-name" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="auth-email" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500">
            </div>
            <div class="mb-6 relative">
                <label class="block text-sm text-slate-400 mb-1">Contraseña</label>
                <input type="password" id="auth-password" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 pr-10 outline-none focus:border-green-500">
                <button onclick="togglePassword()" class="absolute right-3 top-[34px] text-slate-400 hover:text-white text-lg transition-colors">👁️</button>
            </div>
            <button onclick="procesarAuth()" id="btn-auth" class="w-full bg-green-500 text-slate-950 font-bold py-3 rounded-lg hover:bg-green-400 transition-all mb-4">Ingresar</button>
            <p class="text-center text-sm text-slate-500"><span id="auth-switch-text">¿No tenés cuenta?</span> <button onclick="toggleAuthMode()" class="text-green-400 hover:underline font-bold" id="auth-switch-btn">Registrate acá</button></p>
        </div>

        <div id="pending-screen" class="app-screen max-w-md mx-auto bg-slate-900 border border-yellow-500/30 p-8 rounded-2xl shadow-xl text-center">
            <div class="text-5xl mb-4">⏳</div>
            <h2 class="text-2xl font-bold text-yellow-400 mb-2">Cuenta Pendiente</h2>
            <p class="text-slate-400 mb-6">Tomi todavía no aprobó tu cuenta. Avisale para que te habilite.</p>
            <button onclick="cerrarSesion()" class="text-sm text-slate-500 hover:text-white underline">Cerrar Sesión</button>
        </div>

        <div id="main-app-screen" class="app-screen">
            <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800 mb-6">
                <div><p class="text-sm text-slate-400">Bienvenido,</p><p id="user-display-name" class="font-bold text-lg text-green-400">Jugador</p></div>
                <button onclick="cerrarSesion()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition-all">Cerrar Sesión</button>
            </div>
            <div id="timer-container" class="bg-slate-900 border border-yellow-500/30 text-yellow-400 font-mono text-center text-lg font-bold p-3 rounded-xl mb-6 shadow-sm">⏳ Calculando...</div>
            <div class="flex bg-slate-900 p-1 rounded-xl mb-6 border border-slate-800">
                <button onclick="cambiarTab('pronosticos')" id="btn-tab-pronosticos" class="flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg bg-slate-800 text-white shadow transition-all">⚽ Partidos</button>
                <button onclick="cambiarTab('bonus')" id="btn-tab-bonus" class="flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all">🌟 Bonus</button>
                <button onclick="cambiarTab('ranking')" id="btn-tab-ranking" class="flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all">🏅 Ranking</button>
            </div>
            <div id="tab-pronosticos" class="tab-content active space-y-4">
                <div id="groups-nav" class="grid grid-cols-6 gap-1 mb-4"></div>
                <div id="matches-container"><div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500"></div></div></div>
            </div>
            <div id="tab-bonus" class="tab-content">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                    <div><label class="block text-sm text-slate-400 mb-1">Campeón (10 pts)</label><select id="bonus-campeon" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500 prediction-input text-white appearance-none"></select></div>
                    <div><label class="block text-sm text-slate-400 mb-1">Subcampeón (5 pts)</label><select id="bonus-subcampeon" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500 prediction-input text-white appearance-none"></select></div>
                    <div><label class="block text-sm text-slate-400 mb-1">País Decepción (5 pts)</label><select id="bonus-decepcion" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500 prediction-input text-white appearance-none"></select></div>
                    <div><label class="block text-sm text-slate-400 mb-1">Goleador del Torneo (5 pts)</label><input type="text" id="bonus-goleador" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none focus:border-green-500 prediction-input" placeholder="Ej: Mbappé"></div>
                </div>
            </div>
            <div id="tab-ranking" class="tab-content">
                <div id="podium-container" class="grid grid-cols-3 gap-2 sm:gap-4 mb-6"></div>
                <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-950/50 text-slate-400 border-b border-slate-800">
                            <tr><th class="px-4 py-3 text-center w-12">#</th><th class="px-4 py-3">Participante</th><th class="px-4 py-3 text-right">Puntos</th></tr>
                        </thead>
                        <tbody id="ranking-body" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-save" class="fixed bottom-0 left-0 w-full p-4 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 flex justify-center z-50 hidden">
        <button onclick="guardarPredicciones()" id="btn-guardar" class="bg-green-500 hover:bg-green-400 text-slate-950 font-bold text-lg py-3 px-8 rounded-full shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all w-full max-w-2xl">💾 Guardar Pronósticos</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzUzjYnU_tXEZwWb5GIWbiXrnV9_4TZtZU_AZrh47m5dhcc0YC90tl7gyUajUOtOZuG8g/exec"; 
        let partidosGlobales = [];
        let isLocked = false;
        let currentUser = null;
        let authMode = 'login'; 

        function togglePassword() { const input = document.getElementById('auth-password'); input.type = input.type === 'password' ? 'text' : 'password'; }
        function checkSession() {
            const savedUser = localStorage.getItem('prode_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                if(currentUser.is_approved) { mostrarPantalla('main-app-screen'); document.getElementById('user-display-name').innerText = currentUser.name; cargarData(); } 
                else { mostrarPantalla('pending-screen'); }
            } else { mostrarPantalla('auth-screen'); }
        }
        function mostrarPantalla(id) {
            document.querySelectorAll('.app-screen').forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.getElementById('floating-save').style.display = (id === 'main-app-screen' && !document.getElementById('tab-ranking').classList.contains('active')) ? 'flex' : 'none';
        }
        function cerrarSesion() { localStorage.removeItem('prode_user'); currentUser = null; checkSession(); }
        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'Iniciar Sesión' : 'Crear Cuenta';
            document.getElementById('div-name').style.display = authMode === 'login' ? 'none' : 'block';
            document.getElementById('btn-auth').innerText = authMode === 'login' ? 'Ingresar' : 'Registrarme';
        }

        async function procesarAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            const name = document.getElementById('auth-name').value.trim();
            if (!email || !pass) return alert("Completá email y contraseña.");
            const btn = document.getElementById('btn-auth');
            btn.innerText = "Cargando..."; btn.disabled = true;
            try {
                const req = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: authMode, email, password: pass, name }), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                const res = await req.json();
                if (res.status === 'error') alert(res.message);
                else { if (authMode === 'login') { localStorage.setItem('prode_user', JSON.stringify(res.user)); checkSession(); } else { alert(res.message); toggleAuthMode(); } }
            } catch (e) { alert("Error de conexión."); }
            btn.innerText = authMode === 'login' ? 'Ingresar' : 'Registrarme'; btn.disabled = false;
        }

        const lockDate = new Date("2026-06-10T15:00:00Z").getTime();
        setInterval(function() {
            if(!currentUser || !currentUser.is_approved) return;
            const distance = lockDate - new Date().getTime();
            if (distance < 0) {
                isLocked = true;
                const t = document.getElementById("timer-container");
                t.innerHTML = "🔒 CERRADO"; t.className = "bg-slate-900 border border-red-500/30 text-red-500 font-mono text-center text-lg font-bold p-3 rounded-xl mb-6";
                document.getElementById("floating-save").style.display = "none";
                document.querySelectorAll('.prediction-input').forEach(i => { i.disabled = true; i.classList.add('opacity-50'); });
            } else {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("timer-container").innerHTML = `⏳ Cierra en: ${days}d ${hours}h ${minutes}m`;
            }
        }, 1000);

        function cambiarTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            ['pronosticos', 'bonus', 'ranking'].forEach(t => {
                const btn = document.getElementById(`btn-tab-${t}`);
                btn.className = t === tabName ? "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg bg-slate-800 text-white shadow transition-all" : "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all";
            });
            document.getElementById('floating-save').style.display = (tabName === 'ranking' || isLocked) ? 'none' : 'flex';
        }

        function cambiarGrupo(grupo) {
            document.querySelectorAll('.group-content').forEach(g => g.classList.remove('active'));
            document.getElementById(`group-${grupo.replace(/\s/g, '')}`).classList.add('active');
            document.querySelectorAll('.btn-group').forEach(btn => btn.className = "btn-group px-1 py-2 rounded-lg text-[10px] sm:text-xs font-bold whitespace-nowrap transition-colors bg-slate-800 text-slate-400");
            document.getElementById(`btn-group-${grupo.replace(/\s/g, '')}`).className = "btn-group px-1 py-2 rounded-lg text-[10px] sm:text-xs font-bold whitespace-nowrap transition-colors bg-green-500 text-slate-950";
        }

        async function cargarData() {
            try {
                const url = `${API_URL}?email=${encodeURIComponent(currentUser.email)}`;
                const respuesta = await fetch(url);
                const data = await respuesta.json();
                partidosGlobales = data.matches;
                const equiposUnicos = data.teams || [];
                let opcionesHTML = '<option value="">Elegí un país...</option>';
                equiposUnicos.forEach(equipo => { opcionesHTML += `<option value="${equipo}">${equipo}</option>`; });
                document.getElementById('bonus-campeon').innerHTML = opcionesHTML;
                document.getElementById('bonus-subcampeon').innerHTML = opcionesHTML;
                document.getElementById('bonus-decepcion').innerHTML = opcionesHTML;

                const grupos = [...new Set(partidosGlobales.map(p => p.group || "Mundial"))].sort();
                const nav = document.getElementById('groups-nav');
                const container = document.getElementById('matches-container');
                nav.innerHTML = ''; container.innerHTML = '';

                grupos.forEach((grupo, index) => {
                    const groupId = grupo.replace(/\s/g, '');
                    nav.innerHTML += `<button id="btn-group-${groupId}" onclick="cambiarGrupo('${grupo}')" class="btn-group px-1 py-2 rounded-lg text-[10px] sm:text-xs font-bold whitespace-nowrap transition-colors ${index === 0 ? 'bg-green-500 text-slate-950' : 'bg-slate-800 text-slate-400'}">${grupo}</button>`;
                    let htmlGrupo = `<div id="group-${groupId}" class="group-content ${index === 0 ? 'active' : ''} space-y-3">`;
                    const partidosGrupo = partidosGlobales.filter(p => (p.group || "Mundial") === grupo);
                    partidosGrupo.forEach(partido => {
                        htmlGrupo += `<div class="bg-slate-900 border border-slate-800 rounded-xl p-3 sm:p-4 shadow-sm"><div class="text-center text-xs text-slate-500 mb-3 font-medium">🗓️ ${new Date(partido.kickoff_time || new Date()).toLocaleString('es-AR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}hs</div><div class="flex justify-between items-center gap-2"><div class="flex-1 text-right font-bold text-xs sm:text-base truncate">${partido.team_a}</div><div class="flex gap-1 sm:gap-2 items-center justify-center shrink-0">
                        <input type="number" id="goles_a_${partido.id}" min="0" max="20" class="prediction-input w-8 h-8 sm:w-12 sm:h-12 text-center text-sm sm:text-lg bg-slate-950 border border-slate-800 rounded-lg outline-none focus:border-green-500" placeholder="-">
                        <span class="text-slate-600 font-bold">-</span>
                        <input type="number" id="goles_b_${partido.id}" min="0" max="20" class="prediction-input w-8 h-8 sm:w-12 sm:h-12 text-center text-sm sm:text-lg bg-slate-950 border border-slate-800 rounded-lg outline-none focus:border-green-500" placeholder="-">
                        </div><div class="flex-1 text-left font-bold text-xs sm:text-base truncate">${partido.team_b}</div></div></div>`;
                    });
                    htmlGrupo += `</div>`;
                    container.innerHTML += htmlGrupo;
                });
                if (data.userPredictions) data.userPredictions.forEach(p => { 
                    const inputA = document.getElementById(`goles_a_${p.match_id}`); 
                    const inputB = document.getElementById(`goles_b_${p.match_id}`);
                    if (inputA && p.pred_a !== "") inputA.value = p.pred_a; 
                    if (inputB && p.pred_b !== "") inputB.value = p.pred_b; 
                });
                if (data.userBonus && Object.keys(data.userBonus).length > 0) {
                    document.getElementById('bonus-campeon').value = data.userBonus.champion || "";
                    document.getElementById('bonus-subcampeon').value = data.userBonus.runner_up || "";
                    document.getElementById('bonus-decepcion').value = data.userBonus.disappointment || "";
                    document.getElementById('bonus-goleador').value = data.userBonus.top_scorer || "";
                }
                dibujarRanking(data.ranking);
                if(isLocked) document.querySelectorAll('.prediction-input').forEach(i => { i.disabled = true; i.classList.add('opacity-50'); });
            } catch (error) { document.getElementById('matches-container').innerHTML = '<p class="text-center text-red-400">Error al cargar datos.</p>'; }
        }

        function dibujarRanking(ranking) {
            const podium = document.getElementById('podium-container');
            const tbody = document.getElementById('ranking-body');
            podium.innerHTML = ''; tbody.innerHTML = '';
            if(!ranking || ranking.length === 0) { tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-slate-500">Nadie sumó puntos aún 😢</td></tr>'; return; }
            const p1 = ranking[0], p2 = ranking[1], p3 = ranking[2];
            if(p2) podium.innerHTML += `<div class="bg-slate-900/50 border border-silver/30 rounded-xl p-3 text-center order-1 mt-4"><div class="text-xl mb-2">🥈</div><p class="font-medium text-sm truncate">${p2.name}</p><p class="text-lg font-bold text-silver">${p2.points} pts</p></div>`;
            if(p1) podium.innerHTML += `<div class="bg-slate-900/80 border border-gold/40 rounded-xl p-4 text-center order-0 sm:order-1 -mt-2 shadow-[0_0_15px_rgba(251,191,36,0.1)]"><div class="text-2xl mb-2">👑</div><p class="font-medium text-base truncate">${p1.name}</p><p class="text-2xl font-bold text-gold">${p1.points} pts</p></div>`;
            if(p3) podium.innerHTML += `<div class="bg-slate-900/50 border border-bronze/30 rounded-xl p-3 text-center order-2 mt-4"><div class="text-xl mb-2">🥉</div><p class="font-medium text-sm truncate">${p3.name}</p><p class="text-lg font-bold text-bronze">${p3.points} pts</p></div>`;
            ranking.forEach((user, idx) => {
                let badge = idx < 3 ? `<span class="bg-${idx===0?'gold':idx===1?'silver':'bronze'}/20 text-${idx===0?'gold':idx===1?'silver':'bronze'} px-2 py-1 rounded-full font-bold">${idx+1}</span>` : `<span class="bg-slate-800 text-slate-400 px-2 py-1 rounded-full font-bold">${idx+1}</span>`;
                tbody.innerHTML += `<tr class="hover:bg-slate-800/50"><td class="px-4 py-3 text-center">${badge}</td><td class="px-4 py-3 font-medium">${user.name}</td><td class="px-4 py-3 text-right font-bold text-green-400">${user.points}</td></tr>`;
            });
        }

        async function guardarPredicciones() {
            if (isLocked) return alert("¡Cerrado!");
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "⏳ Guardando..."; btn.disabled = true;
            const payload = { action: "save_predictions", user_email: currentUser.email, predictions: [], bonus: null };
            let errorRango = false;
            for (let p of partidosGlobales) {
                let gA = document.getElementById(`goles_a_${p.id}`).value, gB = document.getElementById(`goles_b_${p.id}`).value;
                if (gA !== "" && gB !== "") {
                    let valA = parseInt(gA), valB = parseInt(gB);
                    if (valA < 0 || valA > 20 || valB < 0 || valB > 20) { errorRango = true; break; }
                    payload.predictions.push({ match_id: p.id, pred_a: valA, pred_b: valB });
                }
            }
            if(errorRango) { alert("Los goles deben estar entre 0 y 20."); btn.innerText = "💾 Guardar Pronósticos"; btn.disabled = false; return; }
            const bC = document.getElementById('bonus-campeon').value, bS = document.getElementById('bonus-subcampeon').value, bD = document.getElementById('bonus-decepcion').value, bG = document.getElementById('bonus-goleador').value.trim();
            if(bC || bS || bG || bD) payload.bonus = { champion: bC, runner_up: bS, disappointment: bD, top_scorer: bG };
            try {
                const req = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                alert("¡Guardado! 🏆");
            } catch (e) { alert("Error de conexión."); }
            btn.innerText = "💾 Guardar Pronósticos"; btn.disabled = false;
        }

        checkSession();
    </script>
</body>
</html>
